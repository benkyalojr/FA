<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AVO'Gs FA API — Swagger UI</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui.css" />
  <style>
    html { box-sizing: border-box; overflow-y: scroll; }
    *, *:before, *:after { box-sizing: inherit; }
    body { margin: 0; background: #fafafa; }
    .topbar { display: none; }
    .dev-guide {
      max-width: 1460px; margin: 0 auto; padding: 12px 20px;
      background: #1b3a2f; color: #e8f5e9; font-family: system-ui, sans-serif; font-size: 14px;
    }
    .dev-guide a { color: #a5d6a7; }
  </style>
</head>
<body>
  <div class="dev-guide">
    Mobile team: read the <a href="./MOBILE_APP_GUIDE.md">Frontend Developer Guide</a>
    (retail screens, auth, pricing, JSON examples). Authenticate below to try endpoints.
  </div>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui-standalone-preset.js"></script>
  <script>
    window.onload = function () {
      window.ui = SwaggerUIBundle({
        url: './openapi.yaml',
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        layout: 'StandaloneLayout',
        persistAuthorization: true,
        tryItOutEnabled: true,
        defaultModelsExpandDepth: 1,
        defaultModelExpandDepth: 2,
        docExpansion: 'list',
        filter: true,
        syntaxHighlight: { activate: true, theme: 'monokai' }
      });
    };
  </script>
</body>
</html>
